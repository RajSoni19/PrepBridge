name: Deploy PrepBridge to AWS EC2 (No OAuth)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            REPO_URL="${{ secrets.EC2_REPO_URL }}"
            BRANCH="${{ secrets.EC2_BRANCH }}"
            PUBLIC_BASE_URL="${{ secrets.PUBLIC_BASE_URL }}"

            echo "[1/9] Installing system dependencies"
            sudo apt-get update
            sudo apt-get install -y git curl nginx python3 python3-venv python3-pip build-essential

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "[2/9] Cloning or updating repository"
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$(dirname "$APP_DIR")"
              sudo chown -R "$USER":"$USER" "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "[3/9] Writing backend env (OAuth disabled)"
            cat > Backend/.env <<EOF
            NODE_ENV=production
            PORT=5000
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=7d
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            ML_SERVICE_URL=http://127.0.0.1:8000
            FRONTEND_URL=$PUBLIC_BASE_URL
            FRONTEND_URLS=$PUBLIC_BASE_URL
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            EOF

            echo "[4/9] Deploying backend"
            cd "$APP_DIR/Backend"
            npm ci
            pm2 delete prepbridge-backend || true
            pm2 start src/server.js --name prepbridge-backend

            echo "[5/9] Writing ML env"
            cd "$APP_DIR/ml-service"
            cat > .env <<EOF
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            echo "[6/9] Deploying ML service"
            python3 -m venv venv
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            pm2 delete prepbridge-ml || true
            pm2 start "./venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000" --name prepbridge-ml

            echo "[7/9] Building frontend"
            cd "$APP_DIR/Frontend"
            npm ci
            cat > .env.production <<EOF
            VITE_API_BASE_URL=$PUBLIC_BASE_URL/api
            EOF
            npm run build

            echo "[8/9] Configuring Nginx"
            sudo mkdir -p /var/www/prepbridge
            sudo rm -rf /var/www/prepbridge/*
            sudo cp -r "$APP_DIR/Frontend/dist"/* /var/www/prepbridge/

            sudo tee /etc/nginx/sites-available/prepbridge > /dev/null <<'NGINXCONF'
            server {
                listen 80;
                server_name _;

                root /var/www/prepbridge;
                index index.html;

                location / {
                    try_files $uri /index.html;
                }

                location /api/ {
                    proxy_pass http://127.0.0.1:5000/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /socket.io/ {
                    proxy_pass http://127.0.0.1:5000/socket.io/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "Upgrade";
                    proxy_set_header Host $host;
                }
            }
            NGINXCONF

            sudo ln -sf /etc/nginx/sites-available/prepbridge /etc/nginx/sites-enabled/prepbridge
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl restart nginx
            sudo systemctl enable nginx

            echo "[9/9] Saving PM2 processes"
            pm2 save
            pm2 startup systemd -u "$USER" --hp "$HOME" >/dev/null 2>&1 || true

            echo "Deployment complete"
